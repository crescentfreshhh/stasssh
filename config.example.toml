# Copy this file to `config.toml` and fill in your details.
# `config.toml` is gitignored so your API key never lands in the repo.
#
# You can also override any of these with environment variables:
#   STASH_URL, STASH_API_KEY

[stash]
# Base URL of your Stash server (no trailing /graphql — the client adds it).
url = "http://192.168.1.2:6969"

# API key from Stash → Settings → Security → Authentication.
# Leave empty ("") if your Stash has no authentication configured.
api_key = ""

# Seconds before a GraphQL request times out.
timeout = 30


[sampling]
# How often to sample a frame from each video, in seconds.
# Smaller = finer time resolution but more frames to embed (slower, more cache).
# 2.0 is a good default on GPU; bump to 4-5 on CPU.
interval_seconds = 2.0


[markers]
# The tag name written onto scene markers this tool generates.
# An "apex" is one good timestamp-segment. For multiple taste profiles, give
# each its own tag (e.g. "apex:position", "apex:heels", "apex:bodytype").
tag_name = "apex"


[embedding]
# Which frame embedder to use:
#   "dino" — DINOv2, visual structure (positions, angles, body type)
#   "clip" — OpenCLIP, nameable attributes (outfits, heels)
#   "fake" — deterministic stub for testing without torch
model = "dino"
# Where cached frame vectors live (gitignored). Embed once; reuse forever.
cache_dir = "cache/embeddings"
# "" = auto (CUDA if available, else CPU). Or force "cuda" / "cpu".
device = ""
batch_size = 64


[scoring]
# Tier-1 similarity scoring + segment extraction. Tune `high`/`low` after you
# see a dry run (`peaks score` without --write).
reduce = "max"          # "max" (specific) | "mean" (broader)
# "none": thresholds are absolute (raw cosine / probability).
# "scene-z": scores are z-scored within each scene, so thresholds mean
#   "N std-devs above that scene's baseline" (e.g. high = 2.0, low = 1.0).
#   Useful because raw DINOv2/CLIP similarity baselines vary per library.
normalize = "none"
smooth_window = 3       # moving-average window over per-frame scores
high = 0.45             # enter a segment at/above this score
low = 0.35              # stay in it until the score drops below this
min_duration = 3.0      # discard segments shorter than this (seconds)
merge_gap = 2.0         # merge neighbouring segments closer than this (seconds)
max_duration = 30.0     # split anything longer than this (0 = no cap)
pad = 0.5               # pad each segment edge by this many seconds
# Directory of example stills you love (the Tier-1 references). Gitignored.
references_dir = "references"


[modeling]
# Tier-2 trained classifiers. `peaks label` collects yes/no frame labels,
# `peaks train` fits a model per taste profile, and `peaks score` uses it
# automatically when a models/<tag>.pkl exists (else falls back to Tier-1).
dir = "models"            # where trained models are saved (gitignored)
classifier = "logreg"     # "logreg" (fast, robust) | "mlp"
labels_path = "labels.json"  # your frame labels (gitignored)
